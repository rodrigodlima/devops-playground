rules:
  - id: TF-HARDCODED-PASSWORD
    title: Terraform Hardcoded Password in Resource
    severity: CRITICAL
    regex: 'password\s*=\s*"[^"]+'
    path: '\.tf$'

  - id: PY-HARDCODED-DB-PASSWORD
    title: Python Hardcoded DB_PASSWORD
    severity: CRITICAL
    regex: 'DB_PASSWORD\s*=\s*["''][^"'']+["'']'
    path: '\.py$'
